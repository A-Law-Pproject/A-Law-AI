name: FastAPI CI

on:
  push:
    branches: [main, develop, qa/release-v0.0.1]
  pull_request:
    branches: [main, develop, qa/release-v0.0.1]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      QDRANT_URL: http://localhost:6333
      RABBITMQ_URL: amqp://alawuser:alaw@localhost:5672/alawvhost
      REDIS_URL: redis://localhost:6379/0
      AWS_REGION: ap-northeast-2
      AWS_S3_BUCKET: alaw-image-bucket

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint
        run: flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests
        run: pytest --cov=app tests/ -v

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alaw-ai:latest
            ${{ secrets.DOCKER_USERNAME }}/alaw-ai:${{ github.sha }}
