services:
  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: alaw-qdrant
    ports:
      - "6333:6333" 
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    restart: unless-stopped
    networks:
      - alaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # FastAPI Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alaw-fastapi
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - ./data:/app/data
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - MODEL_NAME=${MODEL_NAME:-gpt-4o}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_COLLECTION=${QDRANT_COLLECTION:-legal_documents}
      - LEGAL_DOCS_PATH=${LEGAL_DOCS_PATH:-data/legal_docs}
      - DEBUG=${DEBUG:-false}
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - alaw-network
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

volumes:
  qdrant_data:
    driver: local

networks:
  alaw-network:
    driver: bridge
