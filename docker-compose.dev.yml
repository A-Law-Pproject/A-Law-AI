# 개발 환경용 Docker Compose
# 사용법: docker-compose -f docker-compose.dev.yml up

services:
  # Qdrant Vector Database (개발 환경)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: alaw-qdrant-dev
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_dev_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    networks:
      - alaw-dev-network

  # Qdrant Web UI
  qdrant-web:
    image: qdrant/qdrant:latest
    container_name: alaw-qdrant-web
    ports:
      - "6335:6333"
    depends_on:
      - qdrant
    networks:
      - alaw-dev-network
    profiles:
      - with-ui

volumes:
  qdrant_dev_data:
    driver: local

networks:
  alaw-dev-network:
    driver: bridge
